name: Efficient Cookie Keeper
on:
  schedule:
    - cron: '* * * * *' # يشتغل "مرة واحدة" فقط أول كل ساعة
  workflow_dispatch: # عشان تشغله يدوي لما تحب

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip' # بيحفظ المكتبات عشان م يحملهاش من الصفر كل مرة

      - name: Run Heartbeat Script
        run: python main.py
